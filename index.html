<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Space Crew Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌌 BACKGROUND CANVAS -->
<canvas id="bg"></canvas>

<!-- 🚀 MAIN MENU -->
<div id="menu">
  <h1>Space Crew</h1>

  <button onclick="startGame()">▶ Play</button>
  <button onclick="openPractice()">🤖 Practice</button>
  <button onclick="openSettings()">⚙ Settings</button>
</div>

<!-- 🤖 PRACTICE MENU -->
<div id="practiceMenu" class="hidden">
  <h2>Practice Mode</h2>

  <label>Role:</label>
  <select id="roleSelect">
    <option value="crewmate">Crewmate</option>
    <option value="impostor">Impostor</option>
    <option value="engineer">Engineer</option>
    <option value="scientist">Scientist</option>
  </select>

  <label>AI Bots:</label>
  <input id="botCount" type="range" min="1" max="10" value="5">

  <button onclick="startPractice()">Start</button>
  <button onclick="backMenu()">Back</button>
</div>

<!-- ⚙ SETTINGS -->
<div id="settingsMenu" class="hidden">
  <h2>Settings</h2>

  <label>Volume</label>
  <input type="range" min="0" max="100" value="50">

  <button onclick="backMenu()">Back</button>
</div>

<!-- 🎮 GAME AREA -->
<div id="game" class="hidden">
  <div id="hud">
    <span id="roleText"></span>
  </div>

  <canvas id="gameCanvas"></canvas>
</div>

<script src="main.js"></script>
<script src="game.js"></script>
<script src="player.js"></script>
<script src="ai.js"></script>

</body>
</html>
